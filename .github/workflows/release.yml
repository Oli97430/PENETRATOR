name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build PENETRATOR.exe
        run: pyinstaller --noconfirm PENETRATOR.spec

      - name: Confirm artifact size
        run: |
          $size = (Get-Item dist/PENETRATOR.exe).Length / 1MB
          Write-Host "Built PENETRATOR.exe ($([math]::Round($size,1)) MB)"

      - name: Generate release notes from CHANGELOG
        id: notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $changelog = Get-Content CHANGELOG.md -Raw
          $pattern = "(?ms)^## \[$([regex]::Escape($version))\][^\n]*\n(.*?)(?=^## \[)"
          $match = [regex]::Match($changelog, $pattern)
          if ($match.Success) {
            $body = $match.Groups[1].Value.Trim()
          } else {
            $body = "Release $tag"
          }
          $body | Out-File -FilePath release_notes.md -Encoding utf8
          Write-Host "--- release notes ---"
          Write-Host $body

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PENETRATOR ${{ github.ref_name }}"
          body_path: release_notes.md
          files: dist/PENETRATOR.exe
          fail_on_unmatched_files: true
