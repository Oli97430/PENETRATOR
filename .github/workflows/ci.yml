name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff pip-audit

      - name: Compile-check
        run: |
          python -m compileall -q core gui modules penetrator.py penetrator_cli.py tests

      - name: Lint (ruff, advisory)
        run: ruff check . --output-format=concise
        continue-on-error: true

      - name: Engine functional tests
        run: python -m pytest tests/ -v

      - name: Verify locales (no missing keys)
        run: python tests/check_locales.py

      - name: Audit dependencies
        run: pip-audit -r requirements.txt
        continue-on-error: true
