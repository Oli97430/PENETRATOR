name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff pip-audit

      - name: Compile-check
        run: |
          python -m compileall -q core gui modules penetrator.py penetrator_cli.py tests

      - name: Lint (ruff, advisory)
        shell: pwsh
        run: |
          $output = ruff check . --output-format=concise 2>&1 | Out-String
          Write-Output "## Ruff lint (advisory)" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "``````" >> $env:GITHUB_STEP_SUMMARY
          Write-Output $output >> $env:GITHUB_STEP_SUMMARY
          Write-Output "``````" >> $env:GITHUB_STEP_SUMMARY
          Write-Output $output
          exit 0

      - name: Engine functional tests + coverage
        run: |
          python -m pytest tests/ -v --cov --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Verify locales (no missing keys)
        run: python tests/check_locales.py

      - name: Audit dependencies
        run: pip-audit -r requirements.txt
        continue-on-error: true
