name: 🐛 Bug report
description: Report a problem with PENETRATOR.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch GUI
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: PENETRATOR version
      placeholder: "v1.1.0 / built from main @ <sha>"
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - Standalone .exe (release)
        - install.bat / install.ps1
        - Manual pip install
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 23H2"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version (if from source)
      placeholder: "3.11.7"

  - type: textarea
    id: logs
    attributes:
      label: Console / log output
      render: shell
