<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380" role="img" aria-label="PENETRATOR logo">
  <defs>
    <linearGradient id="blade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="hilt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#ff5a7d"/>
      <stop offset="50%" stop-color="#ff3860"/>
      <stop offset="100%" stop-color="#a01233"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ff3860" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#ff3860" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff3860" stop-opacity="0"/>
    </radialGradient>
    <filter id="redglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- dark rounded backdrop -->
  <rect x="0" y="0" width="1200" height="380" rx="36" ry="36" fill="#0b0f14"/>
  <rect x="1" y="1" width="1198" height="378" rx="36" ry="36"
        fill="none" stroke="#253241" stroke-width="2"/>

  <!-- red glow behind the dagger -->
  <circle cx="200" cy="190" r="160" fill="url(#glow)"/>

  <!-- dagger: tip points right, scaled up -->
  <g transform="translate(60,190) scale(2)">
    <!-- blade body -->
    <polygon points="0,-14 95,-10 115,0 95,10 0,14"
             fill="url(#blade)" stroke="#1e2833" stroke-width="1.2"/>
    <!-- cutting edge highlight -->
    <polyline points="4,-12 90,-8 110,0"
              fill="none" stroke="url(#edge)" stroke-width="1.2" opacity="0.9"/>
    <!-- central fuller -->
    <line x1="6" y1="0" x2="96" y2="0" stroke="#475569" stroke-width="1.2" opacity="0.8"/>
    <!-- crossguard -->
    <rect x="-12" y="-24" width="14" height="48" rx="2" ry="2"
          fill="url(#hilt)" stroke="#4c0519" stroke-width="1.2"/>
    <!-- grip -->
    <rect x="-48" y="-7" width="36" height="14" rx="3" ry="3"
          fill="#1f2937" stroke="#0f172a" stroke-width="1.2"/>
    <line x1="-44" y1="-7" x2="-44" y2="7" stroke="#334155" stroke-width="0.8"/>
    <line x1="-36" y1="-7" x2="-36" y2="7" stroke="#334155" stroke-width="0.8"/>
    <line x1="-28" y1="-7" x2="-28" y2="7" stroke="#334155" stroke-width="0.8"/>
    <line x1="-20" y1="-7" x2="-20" y2="7" stroke="#334155" stroke-width="0.8"/>
    <!-- pommel -->
    <circle cx="-54" cy="0" r="7" fill="url(#hilt)" stroke="#4c0519" stroke-width="1.2"/>
    <!-- red drip at tip -->
    <circle cx="118" cy="0" r="4.5" fill="#ff3860" filter="url(#redglow)"/>
  </g>

  <!-- wordmark -->
  <g font-family="Segoe UI, Inter, system-ui, sans-serif" font-weight="800">
    <text x="380" y="205" font-size="110" fill="#e6edf3" letter-spacing="8">
      PENE<tspan fill="#ff3860">TRATOR</tspan>
    </text>
    <text x="384" y="262" font-size="30" fill="#8b949e" letter-spacing="12"
          font-weight="500">
      PENETRATION&#160;&#160;TESTING&#160;&#160;TOOLKIT
    </text>
  </g>

  <!-- status pill -->
  <g transform="translate(384,290)">
    <rect x="0" y="0" width="130" height="36" rx="18" ry="18"
          fill="#11161d" stroke="#ff3860" stroke-width="1.5"/>
    <circle cx="20" cy="18" r="6" fill="#ff3860">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="34" y="24" font-family="Consolas, monospace" font-size="16"
          fill="#e6edf3" letter-spacing="2">ONLINE</text>
  </g>

  <!-- language chips -->
  <g transform="translate(530,290)" font-family="Consolas, monospace"
     font-size="16" fill="#8b949e">
    <rect x="0"   y="0" width="46" height="36" rx="10" ry="10" fill="#172029" stroke="#253241" stroke-width="1.5"/>
    <text x="12"  y="24">EN</text>
    <rect x="58"  y="0" width="46" height="36" rx="10" ry="10" fill="#172029" stroke="#253241" stroke-width="1.5"/>
    <text x="70"  y="24">FR</text>
    <rect x="116" y="0" width="46" height="36" rx="10" ry="10" fill="#172029" stroke="#253241" stroke-width="1.5"/>
    <text x="128" y="24">ZH</text>
  </g>

  <!-- author -->
  <text x="1160" y="358" text-anchor="end"
        font-family="Consolas, monospace" font-size="14"
        fill="#6e7681" letter-spacing="1">
    by Tarraw974@gmail.com
  </text>
</svg>
